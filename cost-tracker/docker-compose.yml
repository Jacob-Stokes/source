services:
  cost-tracker:
    build: .
    container_name: cost-tracker
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3200"
    volumes:
      - /root/data:/data
      - /root/.claude/.credentials.json:/data/claude-credentials.json:ro
      - /root/.codex/auth.json:/data/codex-auth.json
    environment:
      - PORT=3200
      - DB_PATH=/data/agent-usage.db
      - API_KEY_FILE=/data/cost-api-key
      - DASH_USER=${DASH_USER}
      - DASH_PASS=${DASH_PASS}
      - WINDMILL_URL=http://windmill-windmill_server-1:8000
      - WINDMILL_TOKEN=${WINDMILL_TOKEN}
    networks:
      - thesys-net

networks:
  thesys-net:
    external: true
